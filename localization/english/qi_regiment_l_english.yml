l_english:

thousand_qi_needles:0 "Thousand Qi Needles"
thousand_qi_needles_flavor:0 "#F With a flick of the sleeve, a thousand condensed needles of qi shriek through the air, weaving a killing net that shreds formations to pieces.#!"

nine_heavens_sword_intent:0 "Nine Heavens Sword Intent"
nine_heavens_sword_intent_flavor:0 "#F A peerless current of sword intent descends from the nine heavens, splitting mountains and tearing open the void wherever it passes.#!"

golden_core_flame_lotus:0 "Golden Core Flame Lotus"
golden_core_flame_lotus_flavor:0 "#F From the dantian blooms a blazing lotus of core-fire. Steel, flesh, and spirit all turn to drifting ash beneath its golden petals.#!"

nascent_soul_phantom:0 "Nascent Soul Phantom"
nascent_soul_phantom_flavor:0 "#F The nascent soul leaves the mortal shell and manifests as a colossal phantom, one step spanning a thousand li, one palm covering the sky.#!"

heaven_severing_blade:0 "Heaven-Severing Blade"
heaven_severing_blade_flavor:0 "#F A horizontal blade of pure qi flashes across heaven and earth, severing fate-lines and splitting even the laws of dao in two.#!"

myriad_dao_suppression_domain:0 "Myriad Dao Suppression Domain"
myriad_dao_suppression_domain_flavor:0 "#F Within this absolute domain, ten thousand daos are suppressed. Techniques fail, spiritual energy scatters, and foes are reduced to trembling mortals.#!"

heavenly_tribulation_descent:0 "Heavenly Tribulation Descent"
heavenly_tribulation_descent_flavor:0 "#F The tribulation lightning that once tested ascension now answers its master. Endless violet-black bolts rain down to punish all who stand in opposition.#!"
